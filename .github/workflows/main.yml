name: DevSecOps Security Pipeline

on: [push]

jobs:
  security-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🔍 Step 1: Code Quality Check (Flake8)
        run: |
          # Fails if code is messy
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: 🛡️ Step 2: Security Scan (Bandit)
        run: |
          # Scans for security issues (like hardcoded passwords)
          # -r means recursive, -ll means medium/high severity
          bandit -r . -ll || true 
          # "|| true" is used so pipeline doesn't stop, just reports issues

      - name: 📦 Step 3: Dependency Check (Safety)
        run: |
          # Checks if any installed library has known vulnerabilities
          safety check || true
