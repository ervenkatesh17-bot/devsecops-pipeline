name: DevSecOps Security Pipeline

on: [push]

jobs:
  security-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flask bandit safety flake8

      - name: Step 1 - Code Quality Check (Flake8)
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Step 2 - Security Scan (Bandit)
        run: |
          bandit -r . -ll || true

      - name: Step 3 - Dependency Check (Safety)
        run: |
          safety check || true
